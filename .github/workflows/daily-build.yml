name: Daily Hugo Rebuild

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  trigger-cloudflare-build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        run: |
          curl -s -X POST "${{ secrets.CF_DEPLOY_HOOK }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
